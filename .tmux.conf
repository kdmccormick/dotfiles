# =============================================================================
# Kyle's .tmux.conf
#
# Almost everything is bound to Alt (M-) with no prefix, so tmux feels like
# native window management. The prefix (Ctrl-b) still works but is rarely used.
#
# Reload after editing:  M-r   (or:  tmux source-file ~/.tmux.conf)
# =============================================================================


# -----------------------------------------------------------------------------
# GENERAL OPTIONS
# -----------------------------------------------------------------------------

# Keep the default Ctrl-b prefix available even though M- bindings cover most things.
set -g prefix C-b
bind-key -n C-b send-prefix

set -g default-terminal "xterm-256color"  # 256-color support
set -g mouse on                            # click to focus, drag to resize, scroll
set -g base-index 1                        # number windows from 1
setw -g pane-base-index 1                  # number panes from 1
set -g renumber-windows on                 # close a window -> renumber the rest
set -g history-limit 10000                 # larger scrollback buffer
setw -g mode-keys vi                       # vi keys in copy mode
set -sg escape-time 0                      # no Esc delay (matters for vim inside tmux)

# Reload this config
bind-key -n M-r source-file ~/.tmux.conf \; display "Config reloaded"


# -----------------------------------------------------------------------------
# SESSIONS
# -----------------------------------------------------------------------------

bind-key -n M-d detach-client      # detach (session keeps running on the server)
bind-key -n M-P switch-client -p   # previous session
bind-key -n M-N switch-client -n   # next session
bind-key -n M-D choose-client      # interactive client/session chooser


# -----------------------------------------------------------------------------
# WINDOWS  (tabs)
# -----------------------------------------------------------------------------

bind-key -n M-t new-window
unbind-key -n c  # TODO temporary

bind-key -n M-. command-prompt -I "#W" "rename-window '%%'"  # rename current window
bind-key -n M-` choose-tree -Zw                              # visual window/session tree
bind-key -n M-f command-prompt "find-window -Z '%%'"         # find window by name

# Previous / next window  (M-[ and M-] are synonyms for M-- and M-=)
bind-key -n M-- previous-window
bind-key -n M-= next-window
bind-key -n M-[ previous-window
bind-key -n M-] next-window

# Jump straight to a window by number
bind-key -n M-0 select-window -t :=0
bind-key -n M-1 select-window -t :=1
bind-key -n M-2 select-window -t :=2
bind-key -n M-3 select-window -t :=3
bind-key -n M-4 select-window -t :=4
bind-key -n M-5 select-window -t :=5
bind-key -n M-6 select-window -t :=6
bind-key -n M-7 select-window -t :=7
bind-key -n M-8 select-window -t :=8
bind-key -n M-9 select-window -t :=9

# Move current window left/right in the window list (browser-style "move tab", stays on it)
bind-key -n M-_ swap-window -d -t -1
bind-key -n M-+ swap-window -d -t +1


# -----------------------------------------------------------------------------
# PANES  (splits within a window)
# -----------------------------------------------------------------------------

bind-key -n M-| split-window -h -c "#{pane_current_path}"   # split left/right
bind-key -n M-\\ split-window -v -c "#{pane_current_path}"  # split top/bottom

# Move focus between panes (vi directions)
bind-key -r -n M-h select-pane -L
bind-key -r -n M-j select-pane -D
bind-key -r -n M-k select-pane -U
bind-key -r -n M-l select-pane -R

bind-key -n M-g display-panes                       # show pane numbers; press one to jump there
bind-key -n M-G display-panes "swap-pane -t '%%'"   # show pane numbers; press one to swap with it
bind-key -n M-BSpace kill-pane

# Expand the current pane:
bind-key -n M-\/ resize-pane -Z   # zoom/unzoom to full window
# Two-column layout: current pane fills the left column, the rest stack on the right.
# (left column width = main-pane-width, default 80 cols; set that option to tune the split)
bind-key -n M-. select-layout main-vertical \; swap-pane -d -t '{top-left}'

# Resize current pane, 4 cells at a time
bind-key -r -n M-K resize-pane -U 4
bind-key -r -n M-J resize-pane -D 4
bind-key -r -n M-H resize-pane -L 4
bind-key -r -n M-L resize-pane -R 4

# Cycle preset layouts (even-horizontal, even-vertical, main-*, tiled)
bind-key -r -n M-Space next-layout

# Pull another window's pane into this one, by prompt
bind-key -n M-v command-prompt -p "join pane to:" "join-pane -t '%%'"

# Send current pane into window 1-0 (-d: don't follow it to that window)
bind-key -n M-! join-pane -d -t ':1'
bind-key -n M-@ join-pane -d -t ':2'
bind-key -n M-# join-pane -d -t ':3'
bind-key -n M-$ join-pane -d -t ':4'
bind-key -n M-% join-pane -d -t ':5'
bind-key -n M-^ join-pane -d -t ':6'
bind-key -n M-& join-pane -d -t ':7'
bind-key -n M-* join-pane -d -t ':8'
bind-key -n M-( join-pane -d -t ':9'
bind-key -n M-) join-pane -d -t ':0'

# Send current pane to the previous/next window (-d: don't follow it there)
bind-key -n M-{ join-pane -d -t :-
bind-key -n M-\} join-pane -d -t :+


# -----------------------------------------------------------------------------
# COMMAND PROMPT & HELP
# -----------------------------------------------------------------------------

bind-key -n M-\; command-prompt   # tmux command prompt (like vim's :)
bind-key -n M-? list-keys         # show all keybindings (read-only)


# -----------------------------------------------------------------------------
# COPY MODE  (mode-keys vi, set above)
# -----------------------------------------------------------------------------
# hjkl              move cursor
# Ctrl-u / Ctrl-d   half-page up / down
# Ctrl-b / Ctrl-f   full page up / down
# g / G             top / bottom of scrollback
# / ?               search forward / backward
# n / N             next / previous match
# v                 begin selection
# y                 yank selection and exit
# q                 quit copy mode


# =============================================================================
# STATUS BAR & STYLING
# =============================================================================

# Bottom-left: session@host: (mirrors the shell's user@host: prompt), with a
# gap before window 1.  status-left-length must be wide enough or it truncates.
set -g status-left " #S@#h:    "
set -g status-left-length 40

# Bottom-right:  [zoom]  load avgs  |  time tz  |  date
#   #{?window_zoomed_flag,...}  shows a marker only while a pane is zoomed (M-.)
#   #(uptime|sed ...)           1/5/15-min load averages (re-run every status-interval)
set -g status-right "#{?window_zoomed_flag,🔍  ,}load #(uptime | sed -E 's/.*averages?: //')  |  %I:%M %p %Z  |  %a, %b %d "
set -g status-right-length 80
set -g status-interval 5   # refresh clock + load every 5s

# Per-host status bar color: modestmac -> clay, coltrane -> blue
if-shell '[ "$(hostname -s)" = "modestmac" ]' 'set -g status-style bg=colour95,fg=white,bold'
if-shell '[ "$(hostname -s)" = "coltrane" ]'  'set -g status-style bg=colour17,fg=white,bold'

# Window list: breathing room between windows, and a bold orange block on the
# active one (matches the active pane border) so it's obvious at a glance.
# Auto-derived names (falling back to the pane title) show in (parens); a name
# you set yourself with M-. shows bare.
set -g window-status-separator "    "                                  # 4 spaces between windows
set -g window-status-format " #I #{?automatic-rename,(#W),#W} "         # inactive
set -g window-status-current-format " #I #{?automatic-rename,(#W),#W} " # active (styled below)
set -g window-status-style "fg=colour250"                              # inactive: muted gray
set -g window-status-current-style "fg=black,bg=colour208,bold"        # active: black on orange block

# Heavy pane borders with a title line showing index, running command, and cwd
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format "#{pane_index}: #{pane_current_command} (#{pane_current_path})"
set -g pane-active-border-style 'fg=colour208'
